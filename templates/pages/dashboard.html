{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Dashboard</h1>
    <p class="text-muted">Shasta County Campaign Finance Disclosures</p>
</div>

<div class="card-grid"
     hx-get="/dashboard/stats"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="card"><div class="card-body"><p class="stat-number">--</p></div></div>
    <div class="card"><div class="card-body"><p class="stat-number">--</p></div></div>
    <div class="card"><div class="card-body"><p class="stat-number">--</p></div></div>
    <div class="card"><div class="card-body"><p class="stat-number">--</p></div></div>
</div>

<div class="card" style="margin-top: 1.5rem;">
    <div class="card-header">
        <h3>Recent Filings</h3>
    </div>
    <div class="card-body"
         hx-get="/dashboard/recent"
         hx-trigger="load"
         hx-swap="innerHTML">
        <p class="text-muted">Loading...</p>
    </div>
</div>

<div class="card" style="margin-top: 1rem;">
    <div class="card-header">
        <h3>System Status</h3>
    </div>
    <div class="card-body">
        <div class="status-row">
            <span>API Health</span>
            <span class="tag tag-success">Online</span>
        </div>
        <div class="status-row">
            <span>Database</span>
            <span class="tag tag-success">Connected</span>
        </div>
        <div class="status-row">
            <span>NetFile API</span>
            <span class="tag tag-muted">Not tested</span>
        </div>
    </div>
</div>
{% endblock %}
