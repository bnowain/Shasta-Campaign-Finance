{% for pl in person_links %}
<span class="person-chip">
    <a href="/people/{{ pl.person.person_id }}" class="person-chip-name">{{ pl.person.canonical_name }}</a>
    <button class="person-chip-remove"
            hx-delete="/people/unlink-transaction?transaction_id={{ transaction_id }}&person_id={{ pl.person.person_id }}"
            hx-target="#person-tags-{{ transaction_id }}"
            hx-swap="innerHTML"
            title="Remove link">&times;</button>
</span>
{% endfor %}
<button class="btn-tag-add"
        onclick="this.nextElementSibling.hidden = !this.nextElementSibling.hidden"
        title="Link person">+</button>
<div hidden>
    <div class="person-tag-dropdown">
        <input type="text"
               class="filter-input"
               placeholder="Search people..."
               hx-get="/people/tag-search?transaction_id={{ transaction_id }}"
               hx-trigger="keyup changed delay:200ms"
               hx-target="closest .person-tag-dropdown"
               hx-swap="outerHTML"
               name="q"
               autocomplete="off"
               style="width: 200px; font-size: 0.8rem; padding: 4px 8px;">
    </div>
</div>
