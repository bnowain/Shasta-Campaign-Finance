<div class="pull-progress" id="pull-progress">
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <span class="pull-progress-text" id="progress-text">Starting pull...</span>
</div>

<script>
(function() {
    var source = new EventSource('/api/pull/stream');
    window._pullEventSource = source;

    source.addEventListener('ingesting', function(e) {
        var data = JSON.parse(e.data);
        var fill = document.getElementById('progress-fill');
        var text = document.getElementById('progress-text');
        if (fill) fill.style.width = data.percent + '%';
        if (text) text.textContent = '[' + data.current + '/' + data.total + '] ' + data.phase + ': ' + data.filing_name;
    });

    source.addEventListener('complete', function(e) {
        source.close();
        htmx.ajax('GET', '/api/pull/complete', {target: '#pull-container', swap: 'innerHTML'});
    });

    source.addEventListener('error_state', function(e) {
        source.close();
        htmx.ajax('GET', '/api/pull/error', {target: '#pull-container', swap: 'innerHTML'});
    });

    source.onerror = function() {
        source.close();
    };
})();
</script>
