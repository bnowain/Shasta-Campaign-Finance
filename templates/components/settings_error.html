<div class="settings-error">
    <span class="tag tag-danger">Error</span>
    <span class="text-muted" style="margin-left: 0.5rem;">{{ message }}</span>
    <button class="btn btn-ghost" style="margin-left: 0.5rem;"
            hx-get="/settings/task-dismiss"
            hx-target="closest .card-body > div:last-child"
            hx-swap="innerHTML">
        Dismiss
    </button>
</div>
